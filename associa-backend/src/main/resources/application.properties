spring.application.name=associa
server.port=8080
server.address=0.0.0.0
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==================== DATABASE ====================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/associa}
spring.datasource.username=${DB_USERNAME:kvill}
spring.datasource.password=${DB_PASSWORD:postgre}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# ==================== JWT CONFIGURATION ====================
jwt.secret=${JWT_SECRET:dev-only-secret-change-before-sharing}
jwt.access-token.expiration=86400000
jwt.refresh-token.expiration=2592000000

# ==================== FRONTEND ====================
app.frontend.reset-password-url=${FRONTEND_RESET_PASSWORD_URL:http://localhost:5174/reset-password}

# ==================== CACHE ====================
spring.cache.type=simple

# ==================== LOGGING ====================
logging.level.root=INFO
logging.level.bf.kvill.associa=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ==================== CORS ====================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175

# ==================== FILE UPLOAD ====================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
