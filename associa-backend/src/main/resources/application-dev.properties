# ==================== DEV PROFILE ====================
# Configuration spécifique au profil dev (développement local)
# Activer avec: -Dspring.profiles.active=dev

# ==================== CACHE ====================
# Utilise cache simple (en mémoire) au lieu de Redis
# Si tu veux Redis en dev, décommente spring-boot-starter-data-redis dans pom.xml
spring.cache.type=simple

# ==================== LOGGING ====================
# Logs plus verbeux en dev
logging.level.root=INFO
logging.level.bf.kvill.associa=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==================== JPA ====================
# Afficher les requêtes SQL formatées
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# ==================== NOTES ====================
# Le DataSeeder s'exécute uniquement en profil dev (@Profile("dev"))
# Comptes créés automatiquement si DB vide:
#   - admin@associa.bf / password (super admin)
#   - test@associa.bf / password (utilisateur test)
app.seed.default-password=${SEED_DEFAULT_PASSWORD:password}

# ==================== EMAIL (DEV) ====================
# Utiliser Mailtrap (https://mailtrap.io/) pour intercepter les emails en dev
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false

# DEV CORS: autorise toutes les origines en développement local (sécuriser en production)
app.cors.allowed-origins=*
